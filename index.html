<style>
  :root{--bg:#0b0b10;--panel:rgba(20,20,30,.72);--border:rgba(255,255,255,.09);--border-strong:rgba(255,255,255,.18);--fg:#f4f4f7;--muted:#9a9aa8;--roblox:#1b1b1f;--roblox-hi:#2a2a30;--danger:#ff5a6a}
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
  .blob.a{width:480px;height:480px;left:-120px;top:-120px;background:#10243a}
  .blob.b{width:520px;height:520px;right:-160px;bottom:-160px;background:#3a1030}
  .blob.c{width:360px;height:360px;left:50%;top:60%;transform:translateX(-50%);background:#0c1a14;opacity:.5}
  .grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%)}
  .scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.02) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.4}
  .stage{position:relative;z-index:2;width:100%;max-width:420px;animation:rise .6s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .card{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:38px 30px 26px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden}
  .card::before{content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;background:linear-gradient(135deg,rgba(0,229,255,.5),rgba(255,61,240,.25),transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:pulse 3.2s ease-in-out infinite;pointer-events:none}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}
  .shine{position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.06),transparent);transform:skewX(-18deg);animation:sweep 5.5s ease-in-out infinite;pointer-events:none}
  @keyframes sweep{0%{left:-60%}55%,100%{left:140%}}
  .logo{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:6px}
  .logo-img{width:104px;height:104px;object-fit:contain;display:block;filter:drop-shadow(0 8px 22px rgba(0,229,255,.18)) drop-shadow(0 6px 14px rgba(0,0,0,.5));animation:floaty 4s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .wordmark{font-family:"Pixelify Sans",cursive;font-weight:700;font-size:30px;letter-spacing:1px;line-height:1;background:linear-gradient(90deg,#fff,#cfe9ff 60%,#9ad7ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-family:"Pixelify Sans",cursive;font-weight:600;font-size:22px;margin:18px 0 6px;text-align:center}
  .sub{color:var(--muted);font-size:14.5px;text-align:center;margin:0 0 26px;line-height:1.5}
  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:11px;padding:14px 16px;border-radius:13px;cursor:pointer;font-family:"Inter",sans-serif;font-weight:600;font-size:15.5px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,var(--roblox-hi),var(--roblox));color:#fff;text-decoration:none;transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.08);box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .btn:active{transform:translateY(0)}.btn:disabled{cursor:wait;opacity:.7;transform:none}
  .btn .rbx-icon{width:24px;height:24px;flex:none;object-fit:contain}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#555;font-size:12px}
  .divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--border)}
  .status{margin-top:16px;text-align:center;font-size:13.5px;min-height:20px;color:var(--muted)}
  .status.error{color:var(--danger)}.status.ok{color:#5ae08a}
  .spinner{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;display:inline-block;vertical-align:-2px;margin-right:7px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .foot{margin-top:18px;text-align:center}
  .foot a{display:inline-flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-size:12.5px;border:1px solid var(--border);padding:7px 13px;border-radius:10px;transition:.2s}
  .foot a:hover{color:var(--fg);border-color:var(--border-strong);background:rgba(255,255,255,.03)}
  .legal{margin-top:14px;font-size:11px;color:#5a5a68;text-align:center;line-height:1.5}
</style>
</head>
<body>
  <div class="ambient" aria-hidden="true"><div class="blob a"></div><div class="blob b"></div><div class="blob c"></div><div class="grid-lines"></div></div>
  <div class="scanlines" aria-hidden="true"></div>
  <main class="stage">
    <section class="card">
